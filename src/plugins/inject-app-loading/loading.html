<meta charset="UTF-8">

<style id="app-loading-style">
  body {
    margin: 0;
  }
  #app-loading-container {
    width: 100vw;
    height: 100vh;
    position: fixed;
    z-index: 999;
    display: flex;
    justify-content: center;
    align-items: center;
    /* https://gitee.com/wyanhui02/html_css_demo/blob/master/css/4.css */
    background-image: linear-gradient(200deg, #0c3483, #a2b6df);
    flex-direction: column;
    row-gap: 12px;
    overflow-y: hidden;
  }
  .app-loading-spinner-group {
    width: 300px;
    height: 300px;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    --h: calc(var(--percent) / 100 * 360);
    color: hsl(var(--h), 100%, 75%);
    animation: change-color 5s linear infinite;
  }
  .app-loading-spinner-group .app-loading-spinner {
    position: absolute;
    --diameter: calc(50px + (var(--n) - 1) * 30px);
    width: var(--diameter);
    height: var(--diameter);
    border-style: solid;
    border-color: currentColor transparent;
    border-width: 10px 10px 0 0;
    border-radius: 50%;
    animation: rotating calc(5s / (9 - var(--n) + 1)) linear infinite;
  }
  .app-loading-title {
    color: #fff;
    font-size: 18px;
    line-height: 1.5;
  }
  @keyframes rotating {
    to {
      transform: rotate(1turn);
    }
  }
  @keyframes change-color {
    0%,
    100% {
      --percent: 0;
    }
    10% {
      --percent: 10;
    }
    20% {
      --percent: 20;
    }
    30% {
      --percent: 30;
    }
    40% {
      --percent: 40;
    }
    50% {
      --percent: 50;
    }
    60% {
      --percent: 60;
    }
    70% {
      --percent: 70;
    }
    80% {
      --percent: 80;
    }
    90% {
      --percent: 90;
    }
  }
</style>

<!-- https://gitee.com/wyanhui02/html_css_demo/blob/master/html/29.html -->
<div id="app-loading-container">
  <div class="app-loading-spinner-group">
    <div class="app-loading-spinner" style="--n: 1"></div>
    <div class="app-loading-spinner" style="--n: 2"></div>
    <div class="app-loading-spinner" style="--n: 3"></div>
    <div class="app-loading-spinner" style="--n: 4"></div>
    <div class="app-loading-spinner" style="--n: 5"></div>
    <div class="app-loading-spinner" style="--n: 6"></div>
    <div class="app-loading-spinner" style="--n: 7"></div>
    <div class="app-loading-spinner" style="--n: 8"></div>
    <div class="app-loading-spinner" style="--n: 9"></div>
  </div>
  <div class="app-loading-title">正在加载系统资源，请耐心等待</div>
</div>
